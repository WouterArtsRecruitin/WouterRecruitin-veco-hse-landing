# Netlify configuration — Veco HSE Landing

[build]
  publish = "."

# Security headers (default for all paths)
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "SAMEORIGIN"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Permissions-Policy = "camera=(), microphone=(), geolocation=()"

# Aggressive caching for static assets (images + videos fingerprintable via deploy)
[[headers]]
  for = "/images/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/videos/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"
    Accept-Ranges = "bytes"

# HTML — shorter cache so deploys propagate quickly
[[headers]]
  for = "/*.html"
  [headers.values]
    Cache-Control = "public, max-age=0, must-revalidate"

# Pretty URL redirect: /veco → / (for later recruitin.nl subdomain mapping)
[[redirects]]
  from = "/veco"
  to = "/"
  status = 301
